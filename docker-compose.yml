services:
  back_finanzas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: back_finanzas
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-3100}:3100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.SERVER_PORT || 3100) + '/api/v1/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
